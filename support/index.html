<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contact - DogzTeam</title>
<link rel="icon" type="image/png" href="weblogo.png">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f1115;
    color: #eaeaea;
}

/* Top bar */
.topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 15px 25px;
    background: #1a1d24;
    border-bottom: 1px solid #2a2f3a;
}

.logo {
    height: 45px;
}

.nav a {
    color: #eaeaea;
    margin-left: 15px;
    text-decoration: none;
    padding: 6px 10px;
    border-radius: 6px;
}

.nav a:hover {
    background: #2a2f3a;
}

/* Layout */
.container {
    display: flex;
    padding: 20px;
    gap: 20px;
}

/* Sidebar */
.sidebar {
    width: 220px;
    background: #151821;
    padding: 15px;
    border-radius: 10px;
    height: fit-content;
}

.sidebar a {
    display: block;
    color: #ccc;
    text-decoration: none;
    padding: 10px;
    border-radius: 6px;
}

.sidebar a:hover {
    background: #2a2f3a;
    color: white;
}

/* Main */
.main {
    flex: 1;
}

/* Hero */
.hero {
    background: linear-gradient(135deg, #1b1f2a, #12141a);
    padding: 25px;
    border-radius: 12px;
    margin-bottom: 20px;
}

.hero h1 {
    margin: 0;
}

.hero p {
    color: #aaa;
}

/* Form box */
.form-box {
    background: #151821;
    border: 1px solid #2a2f3a;
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 20px;
}

/* Inputs */
input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    background: #0f1115;
    border: 1px solid #2a2f3a;
    border-radius: 6px;
    color: #eaeaea;
}

textarea {
    min-height: 120px;
    resize: vertical;
}

/* Button */
.btn {
    margin-top: 15px;
    padding: 10px 15px;
    background: #2d6cdf;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.btn:hover {
    background: #1f56b8;
}

/* Links box */
.links {
    background: #151821;
    border: 1px solid #2a2f3a;
    border-radius: 10px;
    padding: 15px;
}

.links a {
    display: block;
    color: #4ea1ff;
    text-decoration: none;
    margin-bottom: 8px;
}

/* Footer */
.footer {
    text-align: center;
    padding: 15px;
    margin-top: 20px;
    background: #1a1d24;
    color: #888;
}

/* Mobile */
@media (max-width: 800px) {
    .container {
        flex-direction: column;
    }
    .sidebar {
        width: 100%;
    }
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
    <img src="DTMlogo.png" class="logo" alt="Logo">
    <div class="nav">
        <a href="/newweb">Home</a>
        <a href="/newweb/games">Games</a>
        <a href="/newweb/software">Tools</a>
        <a href="/newweb/support">Contact</a>
    </div>
</div>

<!-- CONTENT -->
<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h3>Navigation</h3>
        <a href="/newweb/games">🎮 Games</a>
        <a href="/newweb/software">🧰 Software</a>
        <a href="/Themes">🎨 Themes</a>
        <a href="/newweb/djspace-music">🎵 Music</a>
        <a href="/newweb/books">📚 Books</a>
        <a href="/newweb/pictureblog">🖼️ Pictures & Blog</a>
    </div>

    <!-- MAIN -->
    <div class="main">

        <div class="hero">
            <h1>📬 Contact Us</h1>
            <p>Have a question, suggestion, or just want to say hi? Send us a message.</p>
        </div>

        <div class="form-box">
            <input type="text" id="name" placeholder="Your Name">
            <textarea id="message" placeholder="Your Message"></textarea>
            <button class="btn" onclick="message()">Send Message</button>
        </div>

        <div class="links">
            <h3>🌐 Other Platforms</h3>
            <a href="https://www.github.com/puppy38" target="_blank">GitHub</a>
            <a href="https://www.youtube.com/@ponponi.videos" target="_blank">YouTube</a>
            <a href="https://scratch.mit.edu/users/Tolisxris" target="_blank">Scratch</a>
            <a href="https://discord.gg/Y8CGndx7ct" target="_blank">Discord Server</a>
        </div>

    </div>
</div>

<!-- FOOTER -->
<div class="footer">
    Dogzteam 2026
</div>

<script src="script.js"></script>

</body>
</html>
