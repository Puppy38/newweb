<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pictures & Blog - DogzTeam</title>
<link rel="icon" type="image/png" href="weblogo.png">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f1115;
    color: #eaeaea;
}

/* Top bar */
.topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 15px 25px;
    background: #1a1d24;
    border-bottom: 1px solid #2a2f3a;
}

.logo {
    height: 45px;
}

/* Nav */
.nav a {
    color: #eaeaea;
    margin-left: 15px;
    text-decoration: none;
    padding: 6px 10px;
    border-radius: 6px;
}

.nav a:hover {
    background: #2a2f3a;
}

/* Layout */
.container {
    display: flex;
    padding: 20px;
    gap: 20px;
}

/* Sidebar */
.sidebar {
    width: 220px;
    background: #151821;
    padding: 15px;
    border-radius: 10px;
    height: fit-content;
}

.sidebar a {
    display: block;
    color: #ccc;
    text-decoration: none;
    padding: 10px;
    border-radius: 6px;
}

.sidebar a:hover {
    background: #2a2f3a;
    color: white;
}

/* Main */
.main {
    flex: 1;
}

/* Hero */
.hero {
    background: linear-gradient(135deg, #1b1f2a, #12141a);
    padding: 25px;
    border-radius: 12px;
    margin-bottom: 20px;
}

.hero h1 {
    margin: 0;
}

.hero p {
    color: #aaa;
}

/* Iframe container */
.iframe-box {
    background: #151821;
    border: 1px solid #2a2f3a;
    border-radius: 10px;
    padding: 10px;
}

iframe {
    width: 100%;
    height: 500px;
    border: none;
    border-radius: 8px;
}

/* Footer */
.footer {
    text-align: center;
    padding: 15px;
    margin-top: 20px;
    background: #1a1d24;
    color: #888;
}

/* Mobile */
@media (max-width: 800px) {
    .container {
        flex-direction: column;
    }
    .sidebar {
        width: 100%;
    }
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
    <img src="DTMlogo.png" class="logo" alt="Logo">
    <div class="nav">
        <a href="/newweb">Home</a>
        <a href="/newweb/games">Games</a>
        <a href="/newweb/software">Tools</a>
        <a href="/newweb/support">Contact</a>
    </div>
</div>

<!-- CONTENT -->
<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h3>Navigation</h3>
        <a href="/newweb/games">🎮 Games</a>
        <a href="/newweb/software">🧰 Software</a>
        <a href="/Themes">🎨 Themes</a>
        <a href="/newweb/djspace-music">🎵 Music</a>
        <a href="/newweb/books">📚 Books</a>
        <a href="/newweb/pictureblog">🖼️ Pictures & Blog</a>
    </div>

    <!-- MAIN -->
    <div class="main">

        <div class="hero">
            <h1>🖼️ Pictures & Blog</h1>
            <p>Browse images, updates, and posts from DogzTeam.</p>
        </div>

        <div class="iframe-box">
            <iframe src="https://puppy38.github.io/pictureblog/"></iframe>
        </div>

    </div>
</div>

<!-- FOOTER -->
<div class="footer">
    Dogzteam 2026
</div>

</body>
</html>
